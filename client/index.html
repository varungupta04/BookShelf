<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>BookShelf — Your AI-Powered Reading Companion</title>
  <meta name="description"
    content="Organize your reading life with BookShelf. Track books, build reading habits, get AI recommendations, write reviews, and connect with fellow readers." />
  <meta name="keywords"
    content="book tracker, reading list, book recommendations, AI books, reading habit tracker, book reviews" />
  <meta name="author" content="BookShelf" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://bookshelf.vercel.app" />

  <!-- Open Graph (for link previews on WhatsApp, LinkedIn etc) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bookshelf.vercel.app" />
  <meta property="og:title" content="BookShelf — Your AI-Powered Reading Companion" />
  <meta property="og:description"
    content="Track books, build reading habits, get AI recommendations and connect with fellow readers." />
  <meta property="og:image" content="https://bookshelf.vercel.app/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BookShelf — AI Reading Companion" />
  <meta name="twitter:description" content="Track books, build reading habits, get AI recommendations." />

  <!-- Security headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
  <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
